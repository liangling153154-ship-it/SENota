<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Cao Bang Travel Map — Waterfalls, Caves &amp; City Guide</title>
  <meta name="description"
    content="Interactive travel map of Cao Bang, Vietnam — Ban Gioc waterfall, Nguom Ngao cave, Pac Bo, plus where to eat, sleep and drink in Cao Bang city.">
  <meta name="theme-color" content="#0B2530">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    :root {
      --ink: #0B2530;
      --ink-2: #46626F;
      --surface: #FFFFFF;
      --bg-soft: #EEF6F9;
      --line: #D9E7EC;
      --accent: #EA580C;
      /* decorative orange */
      --accent-deep: #C2410C;
      /* solid buttons — AA with white text */
      --primary: #0E7490;
      --shadow-1: 0 2px 10px rgba(11, 37, 48, .12);
      --shadow-2: 0 10px 32px rgba(11, 37, 48, .22);
      --r-md: 14px;
      --r-lg: 20px;
    }

    /* ---------------- Dark mode ---------------- */
    body.dark {
      --ink: #E9F2F6;
      --ink-2: #9DB4BF;
      --surface: #14262F;
      --bg-soft: #0D1B22;
      --line: #24404C;
      --primary: #4FC3E8;
      --shadow-1: 0 2px 10px rgba(0, 0, 0, .5);
      --shadow-2: 0 10px 32px rgba(0, 0, 0, .65);
    }

    body.dark #map {
      background: #0D1B22;
    }

    body.dark .pin-label {
      text-shadow: 0 1px 0 #0D1B22, 0 -1px 0 #0D1B22, 1px 0 0 #0D1B22, -1px 0 0 #0D1B22, 0 0 6px #0D1B22;
    }

    body.dark .chip[aria-pressed="true"],
    body.dark .toast {
      background: #E9F2F6;
      color: #0B2530;
    }

    body.dark .chip[aria-pressed="true"] svg {
      color: #0B2530;
    }

    body.dark .btn-secondary {
      background: #1D3440;
      border-color: #24404C;
      color: #E9F2F6;
    }

    body.dark .btn-secondary:hover {
      background: #24404C;
    }

    body.dark .welcome {
      background: rgba(0, 0, 0, .62);
    }

    body.dark .leaflet-control-zoom a {
      background: #14262F !important;
      color: #E9F2F6 !important;
    }

    body.dark .leaflet-control-attribution {
      background: rgba(13, 27, 34, .8) !important;
      color: #9DB4BF !important;
    }

    body.dark .leaflet-control-attribution a {
      color: #B8D2DD !important;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: "Be Vietnam Pro", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: var(--bg-soft);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
      border-radius: 6px;
    }

    #map {
      position: fixed;
      inset: 0;
      height: 100dvh;
      width: 100%;
      background: #CFE7EE;
      z-index: 1;
    }

    /* ---------------- Top bar: brand + search + chips ---------------- */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: calc(10px + env(safe-area-inset-top)) 12px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .search-card {
      pointer-events: auto;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-1);
      padding: 8px 14px 9px;
      position: relative;
      z-index: 10;
      /* keep the results dropdown above the chips row */
    }

    .search-brand {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin: 1px 0 0 2px;
    }

    .brand-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .14em;
      color: var(--accent-deep);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .brand-title svg {
      width: 11px;
      height: 11px;
    }

    /* "made by locals" trust line — quieter, sentence case, sits under the title */
    .brand-tagline {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .005em;
      color: var(--ink-2);
      margin-left: 2px;
      line-height: 1.2;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-row .lead-icon {
      width: 18px;
      height: 18px;
      color: var(--ink-2);
      flex: none;
    }

    #search-input {
      flex: 1;
      border: 0;
      outline: none;
      background: transparent;
      font: inherit;
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
      height: 38px;
      min-width: 0;
    }

    #search-input::placeholder {
      color: #7C949F;
      font-weight: 400;
    }

    #search-clear,
    #basemap-btn,
    #theme-btn {
      flex: none;
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      color: var(--ink-2);
    }

    #search-clear {
      display: none;
    }

    #theme-btn {
      display: flex;
      margin-right: -6px;
    }

    #search-clear:hover,
    #basemap-btn:hover,
    #theme-btn:hover {
      background: var(--bg-soft);
    }

    #basemap-btn {
      display: flex;
    }

    #basemap-btn svg {
      width: 17px;
      height: 17px;
    }

    .bm-menu {
      position: absolute;
      right: 8px;
      top: calc(100% + 6px);
      min-width: 170px;
      background: var(--surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-2);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 5;
    }

    .bm-menu[hidden] {
      display: none;
    }

    .bm-menu button {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 44px;
      padding: 0 12px;
      border: 0;
      border-radius: 10px;
      background: none;
      color: var(--ink);
      font-size: 13.5px;
      font-weight: 600;
      text-align: left;
    }

    .bm-menu button:hover {
      background: var(--bg-soft);
    }

    .bm-menu button svg {
      width: 16px;
      height: 16px;
      color: var(--ink-2);
    }

    .bm-menu button[aria-pressed="true"] {
      background: var(--ink);
      color: #fff;
    }

    .bm-menu button[aria-pressed="true"] svg {
      color: #fff;
    }

    body.dark .bm-menu button[aria-pressed="true"] {
      background: #E9F2F6;
      color: #0B2530;
    }

    body.dark .bm-menu button[aria-pressed="true"] svg {
      color: #0B2530;
    }

    .bm-sep {
      height: 1px;
      background: var(--line);
      margin: 5px 6px;
    }

    /* the "Main roads" toggle: a checkbox-style row, not a radio like the styles */
    .bm-menu button[data-toggle] {
      justify-content: space-between;
    }

    .bm-menu button[data-toggle]::after {
      content: "Off";
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-2);
      background: var(--bg-soft);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .bm-menu button[data-toggle][aria-pressed="true"] {
      background: none;
      color: var(--ink);
    }

    .bm-menu button[data-toggle][aria-pressed="true"] svg {
      color: var(--ink-2);
    }

    .bm-menu button[data-toggle][aria-pressed="true"]::after {
      content: "On";
      color: #fff;
      background: var(--primary);
    }

    #search-clear svg {
      width: 16px;
      height: 16px;
    }

    #theme-btn svg {
      width: 17px;
      height: 17px;
    }

    .search-open #search-clear {
      display: flex;
    }

    .results {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      background: var(--surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-2);
      overflow: hidden auto;
      max-height: min(340px, 46dvh);
      display: none;
    }

    .search-open .results.has-items {
      display: block;
    }

    .result {
      display: flex;
      align-items: center;
      gap: 11px;
      width: 100%;
      padding: 9px 14px;
      border: 0;
      background: none;
      text-align: left;
      min-height: 52px;
    }

    .result:hover,
    .result:focus-visible {
      background: var(--bg-soft);
    }

    .result .dot {
      flex: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .result .dot svg {
      width: 16px;
      height: 16px;
    }

    .result .t {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.25;
    }

    .result .s {
      font-size: 12px;
      color: var(--ink-2);
      line-height: 1.3;
    }

    .result.none {
      color: var(--ink-2);
      font-size: 14px;
      cursor: default;
    }

    .chips {
      pointer-events: auto;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      padding: 2px 12px 10px;
      margin: 0 -12px;
      -webkit-overflow-scrolling: touch;
      /* lock the gesture to horizontal panning so a sideways swipe scrolls the
         chips instead of falling through to the map or being read as a page pan */
      touch-action: pan-x;
      overscroll-behavior-x: contain;
      mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: none;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 40px;
      padding: 0 14px;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid transparent;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow-1);
      transition: background .18s ease, color .18s ease, transform .18s ease;
    }

    .chip:active {
      transform: scale(.96);
    }

    .chip svg {
      width: 15px;
      height: 15px;
      color: var(--chip-c, var(--ink-2));
    }

    .chip[aria-pressed="true"] {
      background: var(--ink);
      color: #fff;
    }

    .chip[aria-pressed="true"] svg {
      color: #fff;
    }

    /* ---------------- Markers ---------------- */
    .poi-wrap {
      background: none;
      border: none;
    }

    .pin {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--c, var(--primary));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2.5px solid #fff;
      box-shadow: 0 2px 8px rgba(11, 37, 48, .35);
      transition: transform .18s ease;
      position: relative;
    }

    .pin::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
    }

    /* bigger touch target */
    .pin svg {
      width: 15px;
      height: 15px;
    }

    .pin-lg {
      width: 38px;
      height: 38px;
    }

    .pin-lg svg {
      width: 19px;
      height: 19px;
    }

    .zl-mid .pin:not(.pin-lg) {
      transform: scale(.74);
    }

    .leaflet-marker-icon:hover .pin,
    .pin-active {
      transform: scale(1.14) !important;
    }

    .pin-active {
      box-shadow: 0 0 0 5px color-mix(in srgb, var(--c) 30%, transparent), 0 4px 14px rgba(11, 37, 48, .4);
    }

    .pin-featured::before {
      content: "";
      position: absolute;
      top: -5px;
      right: -5px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #FACC15 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23713F12"><path d="M12 2l2.9 6.26 6.6.57-5 4.4 1.5 6.47L12 16.9 5.99 19.7l1.5-6.47-5-4.4 6.6-.57L12 2z"/></svg>') center/9px no-repeat;
      border: 1.5px solid #fff;
    }

    .pin-label {
      position: absolute;
      top: calc(50% + 21px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink);
      text-shadow: 0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff, 0 0 6px #fff;
      pointer-events: none;
    }

    .pin-label.label-above {
      top: auto;
      bottom: calc(50% + 21px);
    }

    .pin-label.city-label {
      display: none;
    }

    .zl-max .pin-label.city-label {
      display: block;
      top: calc(50% + 17px);
    }

    /* District town labels — quiet orientation markers, not real POIs.
       A small hollow dot + grey name; deliberately understated so the
       real places (photos/coloured pins) stay dominant. */
    .town-marker {
      pointer-events: none;
    }
    /* NB: Leaflet's `.leaflet-marker-pane img { width:auto }` overrides plain
       selectors — town icon width needs !important to win (same gotcha as photo pins). */
    .town-glyph {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      width: 34px !important;    /* default (mid province zoom) */
      height: auto !important;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, .3));
      transition: width .12s ease;
    }
    .town-name {
      position: absolute;
      top: 5px;
      left: 38px;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .01em;
      color: #334155;
      text-shadow: 0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff, 0 0 5px #fff;
    }
    /* whole-province overview: shrink icons & hide labels to stop overlap */
    body.tz-wide .town-glyph { width: 22px !important; }
    body.tz-wide .town-name  { display: none; }
    /* zoomed into a district: bigger, easier to read */
    body.tz-near .town-glyph { width: 46px !important; }
    body.tz-near .town-name  { top: 8px; left: 50px; font-size: 13px; }
    body.dark .town-name {
      color: #cbd5e1;
      text-shadow: 0 1px 0 #0b1220, 0 -1px 0 #0b1220, 1px 0 0 #0b1220, -1px 0 0 #0b1220, 0 0 5px #0b1220;
    }

    /* Photo pins — hero sights show their own photo instead of an icon */
    .photo-pin {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2.5px solid #fff;
      background: var(--bg-soft);
      box-shadow: 0 0 0 2px var(--c, var(--primary)), 0 3px 10px rgba(11, 37, 48, .45);
      position: relative;
      transition: transform .18s ease;
    }

    .photo-pin img {
      /* !important beats Leaflet's ".leaflet-marker-pane img { width: auto }" */
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .leaflet-marker-icon:hover .photo-pin,
    .photo-pin.pin-active {
      transform: scale(1.12);
    }

    .photo-pin.pin-active {
      box-shadow: 0 0 0 3px var(--c, var(--primary)), 0 4px 14px rgba(11, 37, 48, .55);
    }

    .photo-wrap .pin-label {
      top: calc(50% + 34px);
    }

    .photo-wrap .pin-label.label-above {
      top: auto;
      bottom: calc(50% + 34px);
    }

    /* smaller photo pins: regular province sights and city places */
    .photo-pin.photo-md {
      width: 42px;
      height: 42px;
    }

    .photo-pin.photo-sm {
      width: 38px;
      height: 38px;
    }

    .photo-md-wrap .pin-label {
      top: calc(50% + 27px);
    }

    .photo-md-wrap .pin-label.label-above {
      top: auto;
      bottom: calc(50% + 27px);
    }

    .photo-sm-wrap .pin-label {
      top: calc(50% + 25px);
    }

    .zl-max .photo-sm-wrap .pin-label.city-label {
      top: calc(50% + 25px);
    }

    .zl-mid .photo-pin.photo-sm {
      transform: scale(.8);
    }

    /* small category badge on every photo pin */
    .photo-pin .cat-badge {
      position: absolute;
      bottom: -3px;
      right: -3px;
      z-index: 1;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: var(--c, var(--primary));
      border: 1.5px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .photo-pin .cat-badge svg {
      width: 9px;
      height: 9px;
    }

    /* ===== ICONIC sites: teardrop map-pin with a photo inside ===== */
    .teardrop {
      position: relative;
      width: 54px;
      height: 54px;
      /* rounded on 3 corners, sharp bottom-left→ rotated so the tip points down */
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: var(--c, var(--primary));
      border: 3px solid #fff;
      box-shadow: 0 5px 12px rgba(11, 37, 48, .5);
      transition: transform .18s ease;
      /* gentle breathing glow so the hero sights pull the eye */
      animation: iconic-glow 2.8s ease-in-out infinite;
    }

    /* expanding halo ring around each iconic pin, in its category colour */
    .iconic-ping {
      content: "";
      position: absolute;
      left: 50%;
      top: 27px;            /* centre of the round part of the 54px teardrop */
      width: 54px;
      height: 54px;
      margin: -27px 0 0 -27px;
      border-radius: 50%;
      background: var(--c, var(--primary));
      opacity: .45;
      pointer-events: none;
      z-index: -1;
      animation: iconic-ping 2.8s ease-out infinite;
    }

    @keyframes iconic-ping {
      0%   { transform: scale(.7);  opacity: .45; }
      70%  { transform: scale(1.6); opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes iconic-glow {
      0%, 100% { box-shadow: 0 5px 12px rgba(11, 37, 48, .5), 0 0 0 0 color-mix(in srgb, var(--c) 40%, transparent); }
      50%      { box-shadow: 0 5px 14px rgba(11, 37, 48, .55), 0 0 10px 3px color-mix(in srgb, var(--c) 45%, transparent); }
    }

    .teardrop-photo {
      position: absolute;
      inset: 3.5px;
      border-radius: 50%;
      overflow: hidden;
      transform: rotate(45deg);
      /* counter-rotate the photo back to upright */
      background: var(--bg-soft);
    }

    .teardrop-photo img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }

    .teardrop .cat-badge {
      position: absolute;
      right: -1px;
      bottom: -1px;
      transform: rotate(45deg);
      /* badge sits at the pin's shoulder, upright */
      z-index: 2;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--c, var(--primary));
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .teardrop .cat-badge svg {
      width: 12px;
      height: 12px;
    }

    .leaflet-marker-icon:hover .teardrop,
    .teardrop.pin-active {
      transform: rotate(-45deg) scale(1.12);
    }

    .teardrop.pin-active {
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 55%, transparent), 0 5px 14px rgba(11, 37, 48, .55);
    }

    /* ICONIC pins get a bolder, higher-contrast name so the hero sights
       read at a glance — a solid pill behind the text instead of a faint glow. */
    .teardrop-wrap .pin-label,
    .capital-wrap .pin-label {
      top: calc(50% + 20px);
      font-size: 11.5px;
      font-weight: 800;
      letter-spacing: .005em;
      color: #fff;
      padding: 1.5px 7px;
      border-radius: 999px;
      background: rgba(11, 37, 48, .82);
      box-shadow: 0 2px 6px rgba(11, 37, 48, .35);
      text-shadow: none;
    }

    .capital-wrap .pin-label {
      top: calc(50% + 24px);
      background: #B45309;   /* amber to match the gold capital star */
    }

    .teardrop-wrap .pin-label.label-above {
      top: auto;
      bottom: calc(50% + 44px);
    }

    body.dark .teardrop-wrap .pin-label,
    body.dark .capital-wrap .pin-label {
      background: rgba(226, 232, 240, .92);
      color: #0b1220;
    }
    body.dark .capital-wrap .pin-label {
      background: #F5B301;
      color: #3b2a02;
    }

    /* ===== CAPITAL: a round city photo with a gold ring + star badge ===== */
    .capital-wrap {
      cursor: pointer;
    }

    /* round photo of the city, ringed in gold to mark the provincial capital */
    .capital-pin {
      position: relative;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: #F5B301;                 /* gold ring */
      padding: 3.5px;
      box-shadow: 0 0 0 2px #fff, 0 5px 14px rgba(11, 37, 48, .55);
      transition: transform .18s ease;
    }

    .capital-pin-photo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: var(--bg-soft);
    }

    .capital-pin-photo img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }

    /* gold star badge sitting on the pin's top-right shoulder */
    .capital-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(160deg, #FFD54A 0%, #F5B301 60%, #E38C00 100%);
      border: 2px solid #fff;
      color: #7a4d00;
      font-size: 15px;
      line-height: 1;
      box-shadow: 0 2px 5px rgba(11, 37, 48, .45);
    }

    .capital-wrap:hover .capital-pin {
      transform: scale(1.1);
    }

    .capital-wrap::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 72px;
      height: 72px;
      margin: -36px 0 0 -36px;
      border-radius: 50%;
      border: 2px solid rgba(245, 179, 1, .6);
      animation: star-ping 2.4s ease-out infinite;
      pointer-events: none;
    }

    .capital-label {
      top: calc(50% + 34px) !important;
      font-weight: 800;
      font-size: 12px;
    }

    @keyframes star-ping {
      0% {
        transform: scale(.5);
        opacity: .85;
      }

      70% {
        transform: scale(1.25);
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    /* ---------------- Detail card ---------------- */
    .card {
      position: fixed;
      z-index: 1100;
      left: 12px;
      right: 12px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      max-width: 440px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-2);
      overflow: hidden;
      transform: translateY(24px);
      opacity: 0;
      visibility: hidden;
      transition: transform .22s ease, opacity .22s ease, visibility .22s;
    }

    .card.open {
      transform: none;
      opacity: 1;
      visibility: visible;
    }

    .card-media {
      position: relative;
      height: 148px;
      background: var(--bg-soft);
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-media .fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--c);
      /* fallback for browsers without color-mix */
      background: linear-gradient(135deg, color-mix(in srgb, var(--c) 88%, #000 0%), color-mix(in srgb, var(--c) 60%, #063041));
    }

    .card-media .fallback svg {
      width: 52px;
      height: 52px;
      color: rgba(255, 255, 255, .85);
    }

    .card-media .fallback[hidden] {
      display: none;
      /* photo loaded — keep the gradient out of the way */
    }

    .card-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      background: rgba(8, 25, 33, .55);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .card-close svg {
      width: 18px;
      height: 18px;
    }

    .card-tags {
      position: absolute;
      left: 12px;
      bottom: 10px;
      display: flex;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: rgba(8, 25, 33, .6);
      backdrop-filter: blur(4px);
      padding: 4px 10px;
      border-radius: 999px;
    }

    .tag .swatch {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c);
    }

    .tag-pick {
      background: #B45309;
    }

    .tag-veg {
      background: #15803D;
    }

    .card-body {
      padding: 13px 16px calc(15px + env(safe-area-inset-bottom) * 0);
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      margin: 0;
    }

    .card-local {
      font-size: 12.5px;
      color: var(--ink-2);
      margin: 2px 0 0;
    }

    .card-desc {
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--ink);
      margin: 8px 0 0;
    }

    .card-dist {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--primary);
      margin-top: 8px;
    }

    .card-dist svg {
      width: 14px;
      height: 14px;
      flex: none;
    }

    /* Sen's Homestay promo — the host behind the map. Warm amber panel that
       gently sells the homestay as the friendly, one-stop base for the trip. */
    .card-promo {
      margin-top: 12px;
      padding: 11px 13px;
      border-radius: 12px;
      background: linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%);
      border: 1px solid #FED7AA;
    }
    .promo-head {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 800;
      letter-spacing: .01em;
      color: #B45309;
    }
    .promo-head svg {
      width: 15px;
      height: 15px;
      flex: none;
      fill: #F59E0B;
      stroke: #F59E0B;
    }
    .promo-text {
      margin: 5px 0 0;
      font-size: 12.5px;
      line-height: 1.5;
      color: #7C2D12;
    }
    .promo-text strong {
      font-weight: 800;
    }
    body.dark .card-promo {
      background: linear-gradient(135deg, #2A1B0E 0%, #3A2410 100%);
      border-color: #7C4A16;
    }
    body.dark .promo-head { color: #FBBF24; }
    body.dark .promo-text { color: #FED7AA; }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    /* Directions always leads on its own full-width row; the rest share row 2 */
    .card-actions .btn-primary {
      flex: 1 1 100%;
    }

    .btn {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 46px;
      border-radius: 12px;
      border: 0;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: transform .15s ease, filter .15s ease;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .btn-primary {
      background: var(--accent-deep);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.08);
    }

    .btn-secondary {
      background: var(--bg-soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn-secondary:hover {
      background: #E2EEF3;
    }

    .btn-icon {
      flex: 0 0 46px;
    }

    /* ---------------- View toggle ---------------- */
    /* "What are you looking for?" launcher button (bottom center) */
    /* bottom dock: Sen's promo pill + the "what are you looking for" button,
       centred together as one row */
    .bottom-dock {
      position: fixed;
      z-index: 1000;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(14px + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 9px;
      max-width: calc(100vw - 20px);
    }

    /* Sen's Homestay call-to-action pill — promotes the host behind the map */
    .sens-cta {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 50px;
      padding: 0 15px 0 6px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #F59E0B 0%, #EA580C 100%);
      color: #fff;
      cursor: pointer;
      box-shadow: var(--shadow-2);
      flex: none;
      transition: transform .18s ease;
    }
    .sens-cta:active { transform: scale(.97); }
    .sens-cta-photo {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, .9);
      background: #fff;
      flex: none;
    }
    .sens-cta-photo img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }
    .sens-cta-txt {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.15;
      text-align: left;
    }
    .sens-cta-txt small {
      font-size: 9.5px;
      font-weight: 600;
      opacity: .9;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .sens-cta-txt strong {
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .looking-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      height: 50px;
      padding: 0 22px 0 18px;
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-size: 14.5px;
      font-weight: 700;
      box-shadow: var(--shadow-2);
      cursor: pointer;
      flex: none;
      transition: transform .18s ease;
    }

    .looking-btn span { white-space: nowrap; }
    .looking-short { display: none; }
    /* when the Sen's pill shares the row on a phone, shorten the button label */
    @media (max-width: 480px) {
      .looking-full { display: none; }
      .looking-short { display: inline; }
    }

    .looking-btn:active {
      transform: scale(.97);
    }

    .looking-ic {
      display: flex;
      flex: none;
    }

    .looking-ic svg {
      width: 19px;
      height: 19px;
      color: #FDBA74;
    }

    body.dark .looking-btn {
      background: #E9F2F6;
      color: #0B2530;
    }

    body.dark .looking-ic svg {
      color: var(--accent);
    }

    body.card-open .bottom-dock,
    body.trip-open .bottom-dock {
      opacity: 0;
      pointer-events: none;
    }

    /* the ask menu + list sheets share the bottom-sheet look with trips */
    .ask-sheet,
    .list-sheet {
      position: fixed;
      inset: 0;
      z-index: 1950;
      background: rgba(8, 25, 33, .5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .ask-sheet[hidden],
    .list-sheet[hidden] {
      display: none;
    }

    body.dark .ask-sheet,
    body.dark .list-sheet {
      background: rgba(0, 0, 0, .55);
    }

    .ask-panel,
    .list-panel {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      box-shadow: var(--shadow-2);
      padding-bottom: env(safe-area-inset-bottom);
      max-height: 82dvh;
      display: flex;
      flex-direction: column;
    }

    .ask-head,
    .list-head {
      padding: 16px 16px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ask-head h2,
    .list-head h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 800;
      flex: 1;
    }

    #ask-close,
    #list-close,
    #list-back {
      flex: none;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      background: var(--bg-soft);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #ask-close svg,
    #list-close svg,
    #list-back svg {
      width: 15px;
      height: 15px;
    }

    .ask-options {
      padding: 6px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .ask-opt {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      cursor: pointer;
      text-align: left;
    }

    .ask-opt:hover {
      background: var(--bg-soft);
    }

    .ask-opt-ic {
      flex: none;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .ask-opt[data-ask="food"] .ask-opt-ic {
      background: #EA580C;
    }

    .ask-opt[data-ask="trips"] .ask-opt-ic {
      background: #0891B2;
    }

    .ask-opt[data-ask="stay"] .ask-opt-ic {
      background: #6366F1;
    }

    .ask-opt-ic svg {
      width: 22px;
      height: 22px;
    }

    .ask-opt-txt {
      flex: 1;
      min-width: 0;
    }

    .ask-opt-txt strong {
      display: block;
      font-size: 15px;
      color: var(--ink);
    }

    .ask-opt-txt small {
      font-size: 12.5px;
      color: var(--ink-2);
    }

    .ask-opt-arrow {
      flex: none;
      color: var(--ink-2);
    }

    .ask-opt-arrow svg {
      width: 18px;
      height: 18px;
    }

    /* list of choices (food / stay) */
    .list-items {
      overflow-y: auto;
      padding: 6px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .list-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--surface);
      cursor: pointer;
      text-align: left;
    }

    .list-row:hover {
      background: var(--bg-soft);
    }

    .list-row img {
      flex: none;
      width: 54px;
      height: 54px;
      border-radius: 11px;
      object-fit: cover;
      background: var(--bg-soft);
    }

    .list-row-body {
      flex: 1;
      min-width: 0;
    }

    .list-row-title {
      display: block;
      font-weight: 700;
      font-size: 14.5px;
      color: var(--ink);
    }

    .list-row-sub {
      display: block;
      font-size: 12px;
      color: var(--ink-2);
      line-height: 1.35;
      margin-top: 2px;
    }

    .list-row-badges {
      display: flex;
      gap: 5px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .list-badge {
      font-size: 10.5px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      color: #fff;
    }

    .list-empty {
      color: var(--ink-2);
      font-size: 13.5px;
      padding: 16px;
      text-align: center;
    }

    /* ---------------- Trips (suggested itineraries) ---------------- */
    .trips-sheet {
      position: fixed;
      inset: 0;
      z-index: 1900;
      background: rgba(8, 25, 33, .5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .trips-sheet[hidden] {
      display: none;
    }

    .trips-panel {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      max-height: 78dvh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-2);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .trips-head {
      padding: 16px 18px 6px;
      position: relative;
    }

    .trips-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .trips-head p {
      margin: 4px 44px 0 0;
      font-size: 12.5px;
      line-height: 1.45;
      color: var(--ink-2);
    }

    .trips-head p a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    #trips-close,
    #trip-close {
      border: 0;
      border-radius: 50%;
      background: var(--bg-soft);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #trips-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
    }

    #trips-close svg,
    #trip-close svg {
      width: 15px;
      height: 15px;
    }

    .trips-list {
      overflow-y: auto;
      padding: 10px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .trip-card {
      display: flex;
      gap: 12px;
      align-items: center;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 16px;
      padding: 10px;
    }

    .trip-card:hover {
      background: var(--bg-soft);
    }

    .trip-card img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: cover;
      flex: none;
    }

    .trip-card-title {
      display: block;
      font-weight: 800;
      font-size: 14.5px;
      color: var(--ink);
    }

    .trip-card-sub {
      display: block;
      font-size: 12px;
      color: var(--ink-2);
      line-height: 1.4;
      margin-top: 2px;
    }

    .trip-card-meta {
      display: block;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--primary);
      margin-top: 4px;
    }

    .trip-bar {
      position: fixed;
      z-index: 1000;
      left: 12px;
      right: 12px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 18px;
      box-shadow: var(--shadow-2);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .trip-bar[hidden] {
      display: none;
    }

    #trip-close {
      flex: none;
      width: 38px;
      height: 38px;
    }

    .trip-info {
      flex: 1;
      min-width: 0;
    }

    #trip-title {
      display: block;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #trip-meta {
      font-size: 12px;
      color: var(--ink-2);
      font-weight: 600;
    }

    .trip-days {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    /* each day is a tappable pill that opens that day's Google Maps route */
    .day-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10.5px;
      font-weight: 800;
      color: #fff;
      background: var(--dc, var(--accent-deep));
      border-radius: 999px;
      padding: 3px 9px;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease;
    }
    a.day-chip:hover { filter: brightness(1.08); }
    a.day-chip:active { transform: scale(.96); }
    .day-chip svg {
      width: 11px;
      height: 11px;
      flex: none;
    }

    .trip-planner {
      flex: none;
      display: flex;
      align-items: center;
      gap: 5px;
      height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      background: var(--accent-deep);
      color: #fff;
      font-size: 12.5px;
      font-weight: 700;
      text-decoration: none;
    }

    .trip-planner svg {
      width: 14px;
      height: 14px;
    }

    body.card-open .trip-bar {
      opacity: 0;
      pointer-events: none;
    }

    /* numbered stop badges on the route */
    .trip-stop-wrap {
      background: none;
      border: none;
    }

    .trip-stop {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--dc, var(--accent-deep));
      color: #fff;
      font-family: "Be Vietnam Pro", system-ui, sans-serif;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(11, 37, 48, .4);
    }

    .trip-stop svg {
      width: 11px;
      height: 11px;
    }

    .trip-stop-home {
      background: var(--ink);
    }

    body.dark .trip-stop {
      border-color: #14262F;
    }

    body.dark .trip-stop-home {
      background: #E9F2F6;
      color: #0B2530;
    }

    /* ---------------- Welcome overlay ---------------- */
    .welcome {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(8, 25, 33, .5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 1;
      transition: opacity .25s ease, visibility .25s;
    }

    .welcome.hide {
      opacity: 0;
      visibility: hidden;
    }

    .welcome-card {
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-2);
    }

    .welcome-hero {
      height: 150px;
      position: relative;
      background: linear-gradient(135deg, #0E7490, #0B2530);
    }

    .welcome-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .welcome-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 45%, rgba(8, 25, 33, .65));
    }

    .welcome-hero h1 {
      position: absolute;
      z-index: 1;
      left: 18px;
      bottom: 12px;
      margin: 0;
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .welcome-hero h1 small {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      color: #FDBA74;
      margin-bottom: 4px;
    }

    .welcome-body {
      padding: 16px 18px calc(18px + env(safe-area-inset-bottom));
    }

    .welcome-body p {
      margin: 0 0 14px;
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--ink-2);
    }

    .welcome-body .btn+.btn {
      margin-top: 8px;
    }

    .welcome-q {
      font-weight: 800 !important;
      color: var(--ink) !important;
      font-size: 15px !important;
      margin-bottom: 12px !important;
    }

    .wopt {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      cursor: pointer;
      text-align: left;
    }

    .wopt:hover {
      background: var(--bg-soft);
    }

    .wopt-ic {
      flex: none;
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .wopt[data-ask="food"] .wopt-ic {
      background: #EA580C;
    }

    .wopt[data-ask="trips"] .wopt-ic {
      background: #0891B2;
    }

    .wopt[data-ask="stay"] .wopt-ic {
      background: #6366F1;
    }

    .wopt-ic svg {
      width: 20px;
      height: 20px;
    }

    .wopt-txt strong {
      display: block;
      font-size: 14.5px;
      color: var(--ink);
    }

    .wopt-txt small {
      font-size: 12px;
      color: var(--ink-2);
    }

    .welcome-skip {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border: 0;
      background: none;
      color: var(--ink-2);
      font-size: 12.5px;
      font-weight: 600;
      text-decoration: underline;
    }

    /* ---------------- Toast & misc ---------------- */
    .toast {
      position: fixed;
      z-index: 3000;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      bottom: calc(78px + env(safe-area-inset-bottom));
      background: var(--ink);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: var(--shadow-2);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      max-width: min(90vw, 420px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .leaflet-control-zoom {
      border: 0 !important;
      box-shadow: var(--shadow-1) !important;
      border-radius: 12px !important;
      overflow: hidden;
    }

    /* GPS locate button */
    .locate-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow-1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .locate-btn svg {
      width: 20px;
      height: 20px;
    }

    .locate-btn:hover {
      background: var(--bg-soft);
    }

    .locate-btn.locate-active {
      color: #1D4ED8;
    }

    body.dark .locate-btn {
      background: #14262F;
      color: var(--ink);
    }

    body.dark .locate-btn.locate-active {
      color: #60A5FA;
    }

    .locate-btn.locate-loading svg {
      animation: locate-spin 1s linear infinite;
    }

    @keyframes locate-spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* live user-location blue dot */
    .user-loc-wrap {
      background: none;
      border: none;
    }

    .user-loc {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #1D4ED8;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px rgba(29, 78, 216, .4), 0 1px 4px rgba(0, 0, 0, .4);
      position: relative;
    }

    .user-loc::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid rgba(29, 78, 216, .5);
      animation: user-loc-ping 2s ease-out infinite;
    }

    @keyframes user-loc-ping {
      0% {
        transform: scale(.6);
        opacity: .8;
      }

      70% {
        transform: scale(2.2);
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .locate-btn.locate-loading svg,
      .user-loc::after,
      .teardrop,
      .iconic-ping,
      .capital-wrap::before {
        animation: none !important;
      }
      .iconic-ping { display: none; }
    }

    .leaflet-control-zoom a {
      color: var(--ink) !important;
    }

    .leaflet-bottom.leaflet-right {
      bottom: calc(64px + env(safe-area-inset-bottom));
    }

    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255, 255, 255, .75) !important;
    }

    @media (max-width: 520px) {
      .leaflet-control-zoom {
        display: none;
      }

      /* pinch to zoom on phones */
      .leaflet-bottom.leaflet-right {
        bottom: calc(10px + env(safe-area-inset-bottom));
      }
    }

    /* very narrow phones: hide the "Stay with" words to keep the row compact
       (avatar still shows, tap still opens Sen's) */
    @media (max-width: 360px) {
      .sens-cta-txt small { display: none; }
      .sens-cta { padding: 0 6px; }
    }

    @media (min-width: 768px) {
      .topbar {
        align-items: flex-start;
        padding-left: 16px;
      }

      .search-card {
        margin: 0;
        max-width: 400px;
      }

      .chips {
        max-width: calc(100vw - 32px);
      }

      .card {
        left: 16px;
        right: auto;
        width: 400px;
        bottom: 16px;
      }

      .bottom-dock {
        left: auto;
        right: 16px;
        transform: none;
      }

      body.card-open .bottom-dock {
        opacity: 1;
        pointer-events: auto;
      }

      .ask-sheet,
      .list-sheet {
        align-items: center;
      }

      .ask-panel,
      .list-panel {
        border-radius: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        transition-duration: .01ms !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>

  <div id="map" role="application" aria-label="Interactive map of Cao Bang"></div>

  <header class="topbar">
    <div class="search-card" id="search-card">
      <div class="search-brand" id="brand"></div>
      <div class="search-row">
        <span class="lead-icon" id="lead-icon"></span>
        <input id="search-input" type="search" autocomplete="off" spellcheck="false"
          placeholder="Search waterfalls, food, hotels…" aria-label="Search places in Cao Bang">
        <button id="search-clear" aria-label="Clear search"></button>
        <button id="basemap-btn" aria-label="Map style" aria-haspopup="true"></button>
        <button id="theme-btn" aria-label="Toggle dark mode"></button>
      </div>
      <div class="results" id="results" role="listbox" aria-label="Search results"></div>
      <div class="bm-menu" id="basemap-menu" hidden aria-label="Map style"></div>
    </div>
    <nav class="chips" id="chips" aria-label="Filter by category"></nav>
  </header>

  <div class="card" id="card" role="dialog" aria-modal="false" aria-labelledby="card-title">
    <div class="card-media" id="card-media"></div>
    <div class="card-body">
      <h2 class="card-title" id="card-title"></h2>
      <p class="card-local" id="card-local"></p>
      <p class="card-desc" id="card-desc"></p>
      <div class="card-dist" id="card-dist"></div>
      <div class="card-promo" id="card-promo" hidden></div>
      <div class="card-actions" id="card-actions"></div>
    </div>
  </div>

  <div class="bottom-dock" id="bottom-dock">
    <button class="sens-cta" id="sens-cta" type="button" aria-label="Stay with Sen's Homestay — the host behind this map">
      <span class="sens-cta-photo" id="sens-cta-photo"></span>
      <span class="sens-cta-txt"><small>Stay with</small><strong>Sen’s Homestay</strong></span>
    </button>
    <button class="looking-btn" id="looking-btn" type="button">
      <span class="looking-ic" id="looking-ic"></span>
      <span class="looking-full">What are you looking for?</span>
      <span class="looking-short">Find places</span>
    </button>
  </div>

  <!-- "What are you looking for?" menu -->
  <div class="ask-sheet" id="ask-sheet" hidden role="dialog" aria-modal="true" aria-label="What are you looking for">
    <div class="ask-panel">
      <div class="ask-head">
        <h2>What are you looking for?</h2>
        <button id="ask-close" aria-label="Close"></button>
      </div>
      <div class="ask-options">
        <button class="ask-opt" data-ask="food" type="button">
          <span class="ask-opt-ic" data-ic="food"></span>
          <span class="ask-opt-txt"><strong>Food &amp; Coffee</strong><small>Where to eat &amp; drink in the city</small></span>
          <span class="ask-opt-arrow" data-ic="arrow"></span>
        </button>
        <button class="ask-opt" data-ask="trips" type="button">
          <span class="ask-opt-ic" data-ic="route"></span>
          <span class="ask-opt-txt"><strong>Suggested itineraries</strong><small>Ready-made road trips by Sen</small></span>
          <span class="ask-opt-arrow" data-ic="arrow"></span>
        </button>
        <button class="ask-opt" data-ask="stay" type="button">
          <span class="ask-opt-ic" data-ic="bed"></span>
          <span class="ask-opt-txt"><strong>Places to stay</strong><small>Homestays &amp; hotels</small></span>
          <span class="ask-opt-arrow" data-ic="arrow"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- shared list sheet (Food / Stay) -->
  <div class="list-sheet" id="list-sheet" hidden role="dialog" aria-modal="true" aria-label="Choose a place">
    <div class="list-panel">
      <div class="list-head">
        <button id="list-back" aria-label="Back"></button>
        <h2 id="list-title"></h2>
        <button id="list-close" aria-label="Close"></button>
      </div>
      <div class="list-items" id="list-items"></div>
    </div>
  </div>

  <div class="trip-bar" id="trip-bar" hidden>
    <button id="trip-close" aria-label="Exit itinerary"></button>
    <div class="trip-info">
      <strong id="trip-title"></strong>
      <span id="trip-meta"></span>
      <div class="trip-days" id="trip-days"></div>
    </div>
    <a class="trip-planner" id="trip-planner" target="_blank" rel="noopener"></a>
  </div>

  <div class="trips-sheet" id="trips-sheet" hidden role="dialog" aria-modal="true" aria-label="Suggested itineraries">
    <div class="trips-panel">
      <div class="trips-head">
        <h2>Suggested itineraries</h2>
        <p>Road trips curated by Sen — tap one to see it drawn on the map, then
          open it in Google Maps to navigate. <a id="trips-planner-link" href="#" target="_blank" rel="noopener">Full day-by-day planner →</a></p>
        <button id="trips-close" aria-label="Close"></button>
      </div>
      <div class="trips-list" id="trips-list"></div>
    </div>
  </div>

  <div class="welcome hide" id="welcome" role="dialog" aria-modal="true" aria-label="Welcome">
    <div class="welcome-card">
      <div class="welcome-hero">
        <img id="welcome-img" alt="Cao Bang city seen from above" loading="eager">
        <h1><small>VIETNAM'S WILD NORTHEAST</small>Cao Bằng</h1>
      </div>
      <div class="welcome-body">
        <p class="welcome-q">What are you looking for?</p>
        <button class="wopt" data-ask="food" type="button">
          <span class="wopt-ic" data-ic="food"></span>
          <span class="wopt-txt"><strong>Food &amp; Coffee</strong><small>Where to eat &amp; drink</small></span>
        </button>
        <button class="wopt" data-ask="trips" type="button">
          <span class="wopt-ic" data-ic="route"></span>
          <span class="wopt-txt"><strong>Suggested itineraries</strong><small>Ready-made road trips</small></span>
        </button>
        <button class="wopt" data-ask="stay" type="button">
          <span class="wopt-ic" data-ic="bed"></span>
          <span class="wopt-txt"><strong>Places to stay</strong><small>Homestays &amp; hotels</small></span>
        </button>
        <button class="welcome-skip" id="welcome-skip" type="button">Just explore the map</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="boundary.js"></script>
  <script src="highways.js"></script>
  <script src="data.js"></script>
  <script src="trips.js"></script>
  <script src="app.js"></script>
</body>

</html>
