<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Itinerary Builder · Internal Tool</title>
<style>
:root{--gd:#2D6A4F;--or:#E76F51;--cr:#F8F4E9;--gl:#D8F3DC;--tx:#1a1a1a;--tm:#666;--ln:#e0e0e0}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:var(--cr);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.hd{background:var(--gd);color:white;padding:9px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hd h1{font-size:0.95rem;font-weight:600}
.hd .badge{background:rgba(255,255,255,0.18);font-size:0.68rem;padding:2px 8px;border-radius:20px}
.hd .hint{margin-left:auto;font-size:0.73rem;opacity:0.75}
.hd #load-status{font-size:0.73rem;background:rgba(255,255,255,0.12);padding:3px 10px;border-radius:20px}

.layout{display:grid;grid-template-columns:230px 1fr 290px;flex:1;min-height:0;overflow:hidden}

/* ── LEFT: LIBRARY ── */
.lib-panel{border-right:1px solid var(--ln);display:flex;flex-direction:column;background:white;overflow:hidden}
.lib-ph{padding:9px 10px;border-bottom:1px solid var(--ln);flex-shrink:0}
.lib-ph h3{font-size:0.78rem;font-weight:700;color:var(--gd);margin-bottom:6px}
.lib-search{width:100%;border:1px solid var(--ln);border-radius:6px;padding:4px 8px;font-size:0.76rem}
.lib-list{flex:1;overflow-y:auto}
.lib-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background 0.12s;user-select:none}
.lib-item:hover{background:var(--gl)}
.lib-item.home-item{background:rgba(244,163,0,0.07)}
.lib-item.home-item:hover{background:rgba(244,163,0,0.14)}
.lib-item img{width:34px;height:34px;border-radius:6px;object-fit:cover;background:#eee;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-size:0.76rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-km{font-size:0.65rem;color:var(--tm)}
.li-add{width:20px;height:20px;border-radius:50%;background:rgba(45,106,79,0.12);color:var(--gd);font-size:0.85rem;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* ── CENTER: BUILDER ── */
.builder{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.builder-bar{padding:8px 12px;border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:7px;background:white;flex-shrink:0}
.itin-name{border:1px solid var(--ln);border-radius:6px;padding:5px 9px;font-size:0.82rem;flex:1;min-width:0}
.btn{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:6px;border:none;cursor:pointer;font-size:0.76rem;font-weight:500;white-space:nowrap}
.btn-gd{background:var(--gd);color:white}.btn-gd:hover{background:#1e4d38}
.btn-gy{background:#eee;color:#444}.btn-gy:hover{background:#ddd}
.btn-or{background:var(--or);color:white}.btn-or:hover{background:#c25b3f}

.days-scroll{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}

.day-card{background:white;border-radius:9px;border:2px solid transparent;overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.day-card.active{border-color:var(--active-color,#E76F51)}
.day-hd{display:flex;align-items:center;gap:7px;padding:7px 10px;color:white;font-size:0.82rem;font-weight:600;cursor:pointer;user-select:none}
.day-hd .d-sub{font-size:0.68rem;font-weight:400;opacity:0.82}
.day-hd .d-km{margin-left:auto;font-size:0.7rem;font-weight:400;opacity:0.85}
.day-hd .d-rm{background:rgba(255,255,255,0.22);border:none;color:white;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:0.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.day-body{padding:6px}
.day-empty{text-align:center;color:#bbb;font-size:0.75rem;padding:10px 6px;font-style:italic}

.stop-row{display:grid;grid-template-columns:20px 30px 1fr auto;gap:5px;align-items:start;padding:5px 2px;border-bottom:1px solid #f5f5f5}
.stop-row:last-child{border-bottom:none}
.stop-num{width:20px;height:20px;border-radius:50%;color:white;font-size:0.65rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.stop-thumb{width:30px;height:30px;border-radius:5px;object-fit:cover;background:#eee}
.stop-body{min-width:0}
.stop-sname{font-size:0.75rem;font-weight:500;margin-bottom:3px}
.stop-note{width:100%;border:1px solid #e8e8e8;border-radius:4px;padding:3px 6px;font-size:0.7rem;color:#444;resize:none;min-height:26px;font-family:inherit;line-height:1.4}
.stop-note:focus{outline:none;border-color:var(--gd)}
.stop-note::placeholder{color:#ccc}
.stop-acts{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.stop-acts button{background:#f0f0f0;border:none;border-radius:3px;width:20px;height:17px;cursor:pointer;font-size:0.62rem;color:#555;display:flex;align-items:center;justify-content:center}
.stop-acts button:hover{background:#e0e0e0}
.stop-acts button.srm{background:rgba(231,111,81,0.1);color:var(--or)}
.stop-acts button.srm:hover{background:rgba(231,111,81,0.22)}
.stop-acts button:disabled{opacity:0.28;cursor:default}

.sum-bar{border-top:1px solid var(--ln);padding:5px 14px;font-size:0.73rem;color:var(--tm);display:flex;gap:14px;align-items:center;flex-shrink:0;background:white}
.sum-bar strong{color:var(--tx)}

/* ── RIGHT: MAP + EXPORT ── */
.right-panel{border-left:1px solid var(--ln);display:flex;flex-direction:column;background:white;overflow:hidden}
.rp-tabs{display:flex;border-bottom:1px solid var(--ln);flex-shrink:0}
.rp-tab{flex:1;padding:8px 4px;text-align:center;font-size:0.74rem;cursor:pointer;border:none;background:none;color:var(--tm);border-bottom:2px solid transparent}
.rp-tab.on{color:var(--gd);font-weight:600;border-color:var(--gd)}
.map-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
#mini-map{display:block;width:100%;height:100%;cursor:grab}
#mini-map:active{cursor:grabbing}

.out-panel{flex:1;overflow-y:auto;padding:10px;display:none;flex-direction:column;gap:10px}
.out-panel.on{display:flex}
.out-section label{display:block;font-size:0.68rem;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.out-section textarea{width:100%;border:1px solid var(--ln);border-radius:6px;font-family:monospace;font-size:0.66rem;padding:6px;resize:vertical}
.copy-btn{width:100%;padding:5px;border:none;border-radius:6px;background:var(--gd);color:white;cursor:pointer;font-size:0.75rem;margin-top:4px}
.copy-btn:hover{background:#1e4d38}
.copy-btn.copied{background:#52B788}
</style>
</head>
<body>

<div class="hd">
  <h1>🗓 Itinerary Builder</h1>
  <span class="badge">Internal Tool</span>
  <span class="hint">Click ngày để chọn · Click địa điểm bên trái để thêm vào ngày đó</span>
  <span id="load-status">Loading…</span>
</div>

<div class="layout">

  <!-- LEFT -->
  <div class="lib-panel">
    <div class="lib-ph">
      <h3>Destinations</h3>
      <input class="lib-search" id="lib-search" type="text" placeholder="Search spot…" oninput="buildLib()"/>
    </div>
    <div class="lib-list" id="lib-list"></div>
  </div>

  <!-- CENTER -->
  <div class="builder">
    <div class="builder-bar">
      <input class="itin-name" id="itin-name" type="text" placeholder="Itinerary name — e.g. 3 Days Classic"/>
      <button class="btn btn-gd" onclick="addDay()">+ Day</button>
      <button class="btn btn-gy" onclick="clearAll()">Clear</button>
      <button class="btn btn-or" onclick="doExport()">Export →</button>
    </div>
    <div class="days-scroll" id="days-scroll"></div>
    <div class="sum-bar" id="sum-bar">—</div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="rp-tabs">
      <button class="rp-tab on" id="tab-map" onclick="switchTab('map')">🗺 Map preview</button>
      <button class="rp-tab" id="tab-out" onclick="switchTab('out')">📋 Export</button>
    </div>
    <div class="map-wrap" id="map-wrap">
      <svg id="mini-map" viewBox="380 100 520 347" xmlns="http://www.w3.org/2000/svg">
        <image href="images/caobang_map.jpg" x="0" y="0" width="900" height="600" preserveAspectRatio="none"/>
        <g id="ghost-g"></g>
        <g id="pins-g"></g>
      </svg>
    </div>
    <div class="out-panel" id="out-panel">
      <div class="out-section">
        <label>PRESETS entry — paste vào itinerary.html</label>
        <textarea id="out-presets" rows="7" readonly></textarea>
        <button class="copy-btn" onclick="copyOut('out-presets',this)">Copy</button>
      </div>
      <div class="out-section">
        <label>Rich JSON (with notes)</label>
        <textarea id="out-json" rows="12" readonly></textarea>
        <button class="copy-btn" onclick="copyOut('out-json',this)">Copy</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
let LIBRARY = [];
let KM      = {};

// State
let days      = [{ stops: [] }]; // stops: [{id, note}]
let activeDay = 0;

const COLORS = ['#E76F51','#2D6A4F','#264653','#E9C46A','#8338EC','#3A86FF','#06D6A0'];

// ── LOAD from itinerary.html ──────────────────────────────────────────────────
async function loadData(){
  const el = document.getElementById('load-status');
  try {
    const html = await fetch('itinerary.html').then(r=>{
      if(!r.ok) throw new Error();
      return r.text();
    });

    const libStr = html.match(/const LIBRARY = (\[[\s\S]*?\n\];)/)?.[1];
    const kmStr  = html.match(/const KM = (\{[\s\S]*?\n\};)/)?.[1];

    if(libStr) LIBRARY = new Function('return ' + libStr)();
    if(kmStr)  KM      = new Function('return ' + kmStr)();

    el.textContent = `✓ ${LIBRARY.length} spots`;
    el.style.background = 'rgba(255,255,255,0.18)';
  } catch(e) {
    el.textContent = '⚠ Cần chạy qua Live Server (VS Code → Go Live)';
    el.style.background = 'rgba(255,100,0,0.35)';
  }
  buildLib();
  render();
}

// ── KM CALC ───────────────────────────────────────────────────────────────────
function getKm(a, b){
  if(a === b) return 0;
  const v = KM[`${a}->${b}`];
  if(v !== undefined) return v;
  const sp = LIBRARY.find(l=>l.id===b);
  return sp ? sp.km : 0;
}

function calcDayKm(stops){
  if(!stops.length) return 0;
  const full = ['home', ...stops.map(s=>s.id), 'home'];
  let t = 0;
  for(let i=0; i<full.length-1; i++) t += getKm(full[i], full[i+1]);
  return Math.round(t*10)/10;
}

// ── LIBRARY PANEL ─────────────────────────────────────────────────────────────
function buildLib(){
  const q  = document.getElementById('lib-search').value.toLowerCase();
  const el = document.getElementById('lib-list');
  el.innerHTML = '';
  LIBRARY
    .filter(s => !q || s.name.toLowerCase().includes(q) || s.id.includes(q))
    .forEach(s=>{
      const div = document.createElement('div');
      div.className = 'lib-item' + (s.id==='home'?' home-item':'');
      div.innerHTML = `
        <img src="${s.img}" alt="" onerror="this.style.visibility='hidden'">
        <div class="li-info">
          <div class="li-name">${s.name}</div>
          <div class="li-km">${s.id==='home'?'Your base · overnight stop':s.km+'km from homestay'}</div>
        </div>
        <div class="li-add">+</div>`;
      div.onclick = ()=>{ addStop(s.id); };
      el.appendChild(div);
    });
}

// ── STATE ─────────────────────────────────────────────────────────────────────
function addDay(){
  days.push({ stops: [] });
  activeDay = days.length - 1;
  render();
}

function removeDay(di){
  if(days.length <= 1) return;
  days.splice(di, 1);
  if(activeDay >= days.length) activeDay = days.length - 1;
  render();
}

function addStop(id){
  days[activeDay].stops.push({ id, note: '' });
  render();
}

function removeStop(di, si){
  days[di].stops.splice(si, 1);
  render();
}

function moveStop(di, si, dir){
  const arr = days[di].stops;
  const ni  = si + dir;
  if(ni < 0 || ni >= arr.length) return;
  [arr[si], arr[ni]] = [arr[ni], arr[si]];
  render();
}

function setNote(di, si, val){
  days[di].stops[si].note = val;
}

function clearAll(){
  if(!confirm('Xóa tất cả?')) return;
  days = [{ stops:[] }];
  activeDay = 0;
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderDays();
  renderMap();
  renderSummary();
}

function renderDays(){
  const wrap = document.getElementById('days-scroll');
  wrap.innerHTML = '';

  days.forEach((day, di)=>{
    const color   = COLORS[di % COLORS.length];
    const km      = calcDayKm(day.stops);
    const isActive = di === activeDay;

    const card = document.createElement('div');
    card.className = 'day-card' + (isActive ? ' active' : '');
    card.style.setProperty('--active-color', color);
    card.onclick = e=>{
      if(e.target.closest('button,textarea,input')) return;
      activeDay = di;
      render();
    };

    card.innerHTML = `
      <div class="day-hd" style="background:${color}">
        <span>Day ${di+1}</span>
        <span class="d-sub">${day.stops.length} stop${day.stops.length!==1?'s':''}</span>
        <span class="d-km">~${km} km</span>
        ${days.length>1?`<button class="d-rm" onclick="removeDay(${di})">✕</button>`:''}
      </div>
      <div class="day-body" id="db${di}"></div>`;
    wrap.appendChild(card);

    const body = card.querySelector('.day-body');
    if(!day.stops.length){
      body.innerHTML = '<div class="day-empty">← Click địa điểm bên trái để thêm vào ngày này</div>';
    } else {
      day.stops.forEach((stop, si)=>{
        const sp = LIBRARY.find(l=>l.id===stop.id);
        if(!sp) return;
        const row = document.createElement('div');
        row.className = 'stop-row';
        const isHome = sp.id === 'home';
        row.innerHTML = `
          <div class="stop-num" style="background:${color}">${si+1}</div>
          <img class="stop-thumb" src="${sp.img}" alt="" onerror="this.style.visibility='hidden'">
          <div class="stop-body">
            <div class="stop-sname">${sp.name}</div>
            <textarea class="stop-note" rows="1"
              placeholder="${isHome?'Ghi chú nghỉ đêm…':'Ghi chú… (ăn trưa ở đây, xem lúc bình minh, ~2h…)'}"
              oninput="setNote(${di},${si},this.value);autoH(this)">${stop.note}</textarea>
          </div>
          <div class="stop-acts">
            <button onclick="moveStop(${di},${si},-1)" ${si===0?'disabled':''}>↑</button>
            <button onclick="moveStop(${di},${si},1)" ${si===day.stops.length-1?'disabled':''}>↓</button>
            <button class="srm" onclick="removeStop(${di},${si})">✕</button>
          </div>`;
        body.appendChild(row);
        autoH(row.querySelector('textarea'));
      });
    }
  });
}

function autoH(ta){
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function renderMap(){
  const NS     = 'http://www.w3.org/2000/svg';
  const ghostG = document.getElementById('ghost-g');
  const pinsG  = document.getElementById('pins-g');
  ghostG.innerHTML = '';
  pinsG.innerHTML  = '';

  const selected = new Set(days.flatMap(d=>d.stops.map(s=>s.id)));

  // Ghost dots for unselected
  LIBRARY.filter(s=>s.id!=='home' && !selected.has(s.id)).forEach(s=>{
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('cx',s.sx); c.setAttribute('cy',s.sy); c.setAttribute('r','5');
    c.setAttribute('fill','rgba(255,255,255,0.6)');
    c.setAttribute('stroke','rgba(160,160,160,0.8)'); c.setAttribute('stroke-width','1.5');
    ghostG.appendChild(c);
  });

  // Numbered pins per day
  days.forEach((day,di)=>{
    const color = COLORS[di % COLORS.length];
    day.stops.forEach((stop,si)=>{
      const sp = LIBRARY.find(l=>l.id===stop.id);
      if(!sp || sp.id==='home') return;
      const g = document.createElementNS(NS,'g');
      const c = document.createElementNS(NS,'circle');
      c.setAttribute('cx',sp.sx); c.setAttribute('cy',sp.sy); c.setAttribute('r','11');
      c.setAttribute('fill',color); c.setAttribute('stroke','white'); c.setAttribute('stroke-width','2.5');
      c.setAttribute('filter','drop-shadow(0 2px 4px rgba(0,0,0,0.25))');
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x',sp.sx); t.setAttribute('y',sp.sy);
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size','9'); t.setAttribute('fill','white');
      t.setAttribute('font-weight','800'); t.setAttribute('pointer-events','none');
      t.textContent = si+1;
      g.appendChild(c); g.appendChild(t);
      pinsG.appendChild(g);
    });
  });
}

function renderSummary(){
  const totalStops = days.reduce((n,d)=>n+d.stops.length, 0);
  const totalKm    = days.reduce((n,d)=>n+calcDayKm(d.stops), 0);
  const withNotes  = days.flatMap(d=>d.stops).filter(s=>s.note.trim()).length;
  document.getElementById('sum-bar').innerHTML =
    `Active: <strong>Day ${activeDay+1}</strong> &nbsp;·&nbsp;
     <strong>${days.length}</strong> day${days.length!==1?'s':''} &nbsp;·&nbsp;
     <strong>${totalStops}</strong> stops &nbsp;·&nbsp;
     <strong>~${Math.round(totalKm*10)/10} km</strong> total
     ${withNotes?`&nbsp;·&nbsp; <strong>${withNotes}</strong> note${withNotes!==1?'s':''}` : ''}`;
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function doExport(){
  const name  = document.getElementById('itin-name').value.trim() || 'custom';
  const key   = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'') || 'custom';

  // Simple PRESETS format
  const daysArr = days.map(d=>`[${d.stops.map(s=>`'${s.id}'`).join(', ')}]`).join(',\n         ');
  const presetsOut = `// ${name}\n'${key}': [${daysArr}],`;
  document.getElementById('out-presets').value = presetsOut;

  // Rich JSON with notes
  const rich = {
    key,
    label: name,
    totalKm: Math.round(days.reduce((n,d)=>n+calcDayKm(d.stops),0)*10)/10,
    days: days.map((d,di)=>({
      label: `Day ${di+1}`,
      km: calcDayKm(d.stops),
      stops: d.stops.map(s=>{
        const sp = LIBRARY.find(l=>l.id===s.id);
        const out = { id: s.id, name: sp?.name || s.id };
        if(s.note.trim()) out.note = s.note.trim();
        return out;
      })
    }))
  };
  document.getElementById('out-json').value = JSON.stringify(rich, null, 2);

  switchTab('out');
}

function copyOut(id, btn){
  navigator.clipboard.writeText(document.getElementById(id).value).then(()=>{
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('copied'); }, 1600);
  });
}

function switchTab(tab){
  document.getElementById('tab-map').classList.toggle('on', tab==='map');
  document.getElementById('tab-out').classList.toggle('on', tab==='out');
  document.getElementById('map-wrap').style.display  = tab==='map' ? '' : 'none';
  document.getElementById('out-panel').classList.toggle('on', tab==='out');
}

// ── MAP PAN / ZOOM ────────────────────────────────────────────────────────────
const svg = document.getElementById('mini-map');
let vb = {x:380, y:100, w:520, h:347};
let pan = false, panStart = {}, panVB = {};

function setVB(){ svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`); }

svg.addEventListener('wheel', e=>{
  e.preventDefault();
  const f    = e.deltaY > 0 ? 1.15 : 0.87;
  const rect = svg.getBoundingClientRect();
  const px   = (e.clientX - rect.left)  / rect.width;
  const py   = (e.clientY - rect.top)   / rect.height;
  const cx   = vb.x + vb.w * px;
  const cy   = vb.y + vb.h * py;
  const nw   = Math.max(150, Math.min(900, vb.w * f));
  const nh   = nw * (600/900);
  vb = { x: cx-nw*px, y: cy-nh*py, w: nw, h: nh };
  setVB();
}, {passive:false});

svg.addEventListener('mousedown', e=>{ pan=true; panStart={x:e.clientX,y:e.clientY}; panVB={...vb}; });
window.addEventListener('mousemove', e=>{
  if(!pan) return;
  const rect = svg.getBoundingClientRect();
  vb.x = panVB.x - (e.clientX - panStart.x) / rect.width  * vb.w;
  vb.y = panVB.y - (e.clientY - panStart.y) / rect.height * vb.h;
  setVB();
});
window.addEventListener('mouseup', ()=> pan=false);

// ── INIT ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
